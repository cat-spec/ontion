      .xs{font:400 13px "PingFang SC","Microsoft YaHei",sans-serif;fill:#8290a3}
      .n{font:700 34px "PingFang SC","Microsoft YaHei",sans-serif;fill:#1f2f41}
      .side{fill:#0f1d30}
      .bg{fill:#f2f7fb}
      .shell{fill:#ffffff;stroke:#d9e4ee;stroke-width:2}
      .panel{fill:#ffffff;stroke:#dde6ef;stroke-width:2}
      .soft{fill:#f7fbfd;stroke:#dde6ef;stroke-width:2}

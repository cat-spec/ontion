      .line{fill:none;stroke:#18c2c8;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .compare{fill:#0f8f95}
      .badge{fill:#fef3e6;stroke:#f8d6a2;stroke-width:1}
